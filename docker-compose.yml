version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: realmonitor-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    container_name: realmonitor-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/targets.json:/etc/prometheus/targets.json

  node-exporter:
    image: prom/node-exporter:latest
    container_name: realmonitor-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: realmonitor-blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"

  backend:
    build:
      context: ./backend
    container_name: realmonitor-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/realmonitor
      - PROMETHEUS_URL=http://prometheus:9090
      - PROM_FILE_SD_PATH=/app/config/targets.json
      - POLL_INTERVAL_MS=15000
      - WS_PATH=/ws
      - LOCALHOST_ALIAS=10.67.165.125
    volumes:
      - ./infra/prometheus/targets.json:/app/config/targets.json
    depends_on:
      - mongo
      - prometheus

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:4000
        VITE_WS_URL: ws://localhost:4000/ws
    container_name: realmonitor-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
